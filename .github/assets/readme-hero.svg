<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" width="1200" height="280">
    <title>CSFloat Node.js SDK</title>
    <desc>Minimal, documentation-first hero banner for the CSFloat Node.js and TypeScript SDK.</desc>

    <defs>
        <radialGradient id="bg-glow" cx="15%" cy="35%" r="75%">
            <stop offset="0%" stop-color="#1c150e" />
            <stop offset="100%" stop-color="#0a0908" />
        </radialGradient>

        <linearGradient id="line-fade" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#e8b960" stop-opacity="0" />
            <stop offset="25%" stop-color="#e8b960" stop-opacity="0.25" />
            <stop offset="85%" stop-color="#e8b960" stop-opacity="0.25" />
            <stop offset="100%" stop-color="#e8b960" stop-opacity="0" />
        </linearGradient>

        <filter id="glow-strong" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>

        <filter id="glow-subtle" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <style>
        .title {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            font-size: 56px;
            font-weight: 800;
            fill: #fdfbf7;
            letter-spacing: -0.02em;
        }
        .subtitle {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            font-size: 22px;
            font-weight: 400;
            fill: #c9baa3;
            letter-spacing: 0.01em;
        }
        .link-text {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            font-size: 15px;
            font-weight: 500;
        }
        .link-label { fill: #8a7b66; }
        .link-arrow { fill: #e8b960; }
        .link-url { fill: #e8b960; }

        .meta {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            font-size: 12px;
            font-weight: 600;
            fill: #756754;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        @keyframes pulse-opacity {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }
        .glow-dot {
            animation: pulse-opacity 4s ease-in-out infinite;
        }
        .glow-dot.delay-1 { animation-delay: 1.5s; }
        .glow-dot.delay-2 { animation-delay: 3s; }

        .subtle-line {
            stroke: url(#line-fade);
            stroke-width: 1.5;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .outer-border {
            stroke: #2a2219;
            stroke-width: 1.5;
            fill: none;
            rx: 15;
        }
    </style>

    <rect width="1200" height="280" fill="#0a0908" rx="16" />
    <rect width="1200" height="280" fill="url(#bg-glow)" rx="16" />

    <g id="registration-marks" fill="#4a3f31">
        <circle cx="40" cy="40" r="1.5" />
        <circle cx="40" cy="240" r="1.5" />
        <circle cx="1160" cy="40" r="1.5" />
        <circle cx="1160" cy="240" r="1.5" />
    </g>

    <g id="node-graph">
        <path class="subtle-line" d="M 700,80 L 880,80 L 910,110 L 1120,110" />
        <path class="subtle-line" d="M 740,140 L 880,140 L 910,110" />
        <path class="subtle-line" d="M 910,110 L 940,140 L 1120,140" />
        <path class="subtle-line" d="M 780,200 L 960,200 L 990,170 L 1120,170" />
        <path class="subtle-line" d="M 1030,140 L 1060,170" />

        <path d="M 820,77 v 6 M 1000,107 v 6 M 850,137 v 6 M 900,197 v 6 M 1080,167 v 6 M 1045,152 v 6" stroke="#4a3f31" stroke-width="1.5" fill="none" />

        <circle cx="880" cy="80" r="3.5" fill="#0a0908" stroke="#8a7b66" stroke-width="1.5" />
        <circle cx="910" cy="110" r="4.5" fill="#0a0908" stroke="#e8b960" stroke-width="1.5" />
        <circle cx="880" cy="140" r="3.5" fill="#0a0908" stroke="#8a7b66" stroke-width="1.5" />
        <circle cx="940" cy="140" r="3.5" fill="#0a0908" stroke="#8a7b66" stroke-width="1.5" />
        <circle cx="960" cy="200" r="3.5" fill="#0a0908" stroke="#8a7b66" stroke-width="1.5" />
        <circle cx="990" cy="170" r="4.5" fill="#0a0908" stroke="#e8b960" stroke-width="1.5" />
        <circle cx="1030" cy="140" r="3.5" fill="#0a0908" stroke="#8a7b66" stroke-width="1.5" />
        <circle cx="1060" cy="170" r="3.5" fill="#0a0908" stroke="#8a7b66" stroke-width="1.5" />

        <circle cx="780" cy="80" r="2.5" fill="#e8b960" class="glow-dot delay-1" filter="url(#glow-subtle)" />
        <circle cx="910" cy="110" r="2.5" fill="#e8b960" class="glow-dot" filter="url(#glow-strong)" />
        <circle cx="1090" cy="110" r="2.5" fill="#e8b960" class="glow-dot delay-2" filter="url(#glow-subtle)" />
        <circle cx="820" cy="140" r="2.5" fill="#e8b960" class="glow-dot delay-1" filter="url(#glow-subtle)" />
        <circle cx="990" cy="170" r="2.5" fill="#e8b960" class="glow-dot" filter="url(#glow-strong)" />
        <circle cx="860" cy="200" r="2.5" fill="#e8b960" class="glow-dot delay-2" filter="url(#glow-subtle)" />
    </g>

    <g transform="translate(80, 0)">
        <text x="-4" y="115" class="title">CSFloat SDK</text>
        <text x="0" y="160" class="subtitle">Node.js + TypeScript SDK for the practical CSFloat API</text>

        <text x="0" y="205" class="link-text">
            <tspan class="link-label">docs</tspan>
            <tspan class="link-arrow" dx="10">→</tspan>
            <tspan class="link-url" dx="10">csfloat-node-sdk.vercel.app</tspan>
        </text>

        <text x="0" y="250" class="meta">market • listings • offers • trades • buy orders • docs</text>
    </g>

    <rect width="1198.5" height="278.5" x="0.75" y="0.75" class="outer-border" />
</svg>
