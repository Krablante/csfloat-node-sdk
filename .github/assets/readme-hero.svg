<svg width="1200" height="280" viewBox="0 0 1200 280" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">csfloat-node-sdk</title>
  <desc id="desc">Dark-gold animated README hero for csfloat-node-sdk.</desc>
  <defs>
    <linearGradient id="bg" x1="38" y1="24" x2="1158" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#070504"/>
      <stop offset="0.48" stop-color="#120A04"/>
      <stop offset="1" stop-color="#090604"/>
    </linearGradient>
    <linearGradient id="frame" x1="46" y1="40" x2="1092" y2="240" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7D5B21" stop-opacity="0.65"/>
      <stop offset="0.5" stop-color="#D6A348" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#7D5B21" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="signalLine" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#8C6423" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#D7A34B" stop-opacity="1"/>
      <stop offset="1" stop-color="#8C6423" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(912 78) rotate(90) scale(140 180)">
      <stop stop-color="#D29A3D" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#D29A3D" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1028 196) rotate(180) scale(190 120)">
      <stop stop-color="#9A691E" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#9A691E" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <style>
      .frame { fill: url(#bg); stroke: url(#frame); stroke-width: 1.2; }
      .panel { fill: rgba(255,255,255,0.02); stroke: rgba(214,163,72,0.20); stroke-width: 1; }
      .panel-grid { stroke: rgba(214,163,72,0.08); stroke-width: 1; }
      .kicker { fill: #D9A74A; font: 700 14px/1.2 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; letter-spacing: 0.32em; text-transform: uppercase; }
      .main { fill: #FFF4DF; font: 800 70px/1 "Segoe UI", "Helvetica Neue", Arial, sans-serif; letter-spacing: -0.045em; }
      .main-soft { fill: rgba(255, 244, 223, 0.16); animation: drift 6.6s ease-in-out infinite; }
      .sub { fill: #EAD3A5; font: 500 24px/1.4 "Segoe UI", "Helvetica Neue", Arial, sans-serif; }
      .meta { fill: #C79643; font: 600 14px/1.4 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; letter-spacing: 0.18em; }
      .mono { fill: #F3D9A5; font: 600 18px/1.4 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .muted { fill: #B58A42; font: 500 14px/1.4 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .signal { fill: none; stroke: url(#signalLine); stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 4 8; animation: pulseLine 8s linear infinite; }
      .bar { fill: rgba(215,163,75,0.82); transform-box: fill-box; transform-origin: center bottom; animation: equalize 4.2s ease-in-out infinite; }
      .bar:nth-child(2) { animation-delay: 0.25s; }
      .bar:nth-child(3) { animation-delay: 0.5s; }
      .bar:nth-child(4) { animation-delay: 0.75s; }
      .bar:nth-child(5) { animation-delay: 1s; }
      .pulse-dot { animation: pulse 3.2s ease-in-out infinite; }
      .glitch-a { fill: rgba(255, 107, 132, 0.16); animation: glitchA 5.8s steps(2, end) infinite; }
      .glitch-b { fill: rgba(98, 185, 255, 0.14); animation: glitchB 5.8s steps(2, end) infinite; }
      @keyframes drift {
        0%, 100% { transform: translate(0, 0); opacity: 0.1; }
        50% { transform: translate(1.5px, -1px); opacity: 0.2; }
      }
      @keyframes pulseLine {
        0% { stroke-dashoffset: 0; opacity: 0.55; }
        50% { opacity: 0.9; }
        100% { stroke-dashoffset: -120; opacity: 0.55; }
      }
      @keyframes equalize {
        0%, 100% { transform: scaleY(0.38); opacity: 0.42; }
        50% { transform: scaleY(1); opacity: 1; }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.42; }
        50% { opacity: 1; }
      }
      @keyframes glitchA {
        0%, 94%, 100% { transform: translate(0, 0); opacity: 0; }
        95% { transform: translate(-2px, 1px); opacity: 1; }
        97% { transform: translate(2px, -1px); opacity: 0.6; }
      }
      @keyframes glitchB {
        0%, 95%, 100% { transform: translate(0, 0); opacity: 0; }
        96% { transform: translate(2px, -1px); opacity: 0.9; }
        98% { transform: translate(-1px, 1px); opacity: 0.45; }
      }
    </style>
  </defs>

  <rect x="18" y="18" width="1164" height="244" rx="28" class="frame"/>
  <rect x="34" y="34" width="1132" height="212" rx="22" fill="none" stroke="rgba(214,163,72,0.10)" stroke-width="1"/>

  <ellipse cx="905" cy="80" rx="190" ry="128" fill="url(#glowA)"/>
  <ellipse cx="1000" cy="204" rx="216" ry="120" fill="url(#glowB)"/>
  <circle cx="1014" cy="82" r="38" fill="#D4A04C" opacity="0.08" filter="url(#softGlow)"/>

  <g transform="translate(74 78)">
    <text class="kicker">live-validated • docs site • coverage matrix</text>

    <g transform="translate(0 54)">
      <text class="main-soft">CSFloat SDK</text>
      <text class="glitch-a main">CSFloat SDK</text>
      <text class="glitch-b main">CSFloat SDK</text>
      <text class="main">CSFloat SDK</text>
    </g>

    <text y="138" class="sub">Node.js + TypeScript surface for the practical CSFloat API.</text>
    <text y="176" class="meta">MARKET • LISTINGS • OFFERS • TRADES • BUY ORDERS • DOCS</text>
  </g>

  <g transform="translate(820 48)">
    <rect width="290" height="164" rx="18" class="panel"/>
    <path d="M18 40H272" class="signal"/>
    <path d="M18 120H272" class="signal" style="animation-delay: -2.8s"/>
    <path d="M28 54H262" class="panel-grid"/>
    <path d="M28 82H262" class="panel-grid"/>
    <path d="M28 110H262" class="panel-grid"/>
    <path d="M28 138H262" class="panel-grid"/>

    <g transform="translate(26 24)">
      <text class="muted">docs → csfloat-node-sdk.vercel.app</text>
      <text y="60" class="mono">npm i csfloat-node-sdk</text>
      <text y="98" class="muted">audited routes • typed helpers • synced docs</text>
    </g>

    <g transform="translate(220 52)">
      <rect class="bar" x="0" y="36" width="8" height="44" rx="4"/>
      <rect class="bar" x="16" y="18" width="8" height="62" rx="4"/>
      <rect class="bar" x="32" y="6" width="8" height="74" rx="4"/>
      <rect class="bar" x="48" y="26" width="8" height="54" rx="4"/>
      <rect class="bar" x="64" y="42" width="8" height="38" rx="4"/>
    </g>
  </g>

  <g transform="translate(74 226)">
    <circle cx="4" cy="4" r="4" fill="#D9A74A" class="pulse-dot"/>
    <text x="18" y="10" class="muted">package: csfloat-node-sdk</text>
  </g>
</svg>
