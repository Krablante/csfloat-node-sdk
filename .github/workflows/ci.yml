name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --package-lock=false

      - name: Run tests
        run: npm test

      - name: Run typecheck
        run: npm run check

      - name: Check Node entrypoints
        run: npm run check:node

      - name: Build package
        run: npm run build

      - name: Check package bundle
        run: npm run pack:check
